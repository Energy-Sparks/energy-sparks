      description_html: |-
        <p>
          Energy Sparks helps schools and trusts cut energy waste, reduce carbon emissions and save money.
        </p>
        <p>
          Using <a href="/product">our energy management tool</a> and data-driven insights, schools identify
          simple, no-cost actions and optimise heating controls to reduce energy waste and improve efficiency.
        </p>
        <p>
          Energy Sparks empowers pupils to understand their school's energy use, develop practical climate
          action skills and lead real-world projects that reduce carbon emissions and create lasting behaviour change.
        </p>
        <p>
          See the difference Energy Sparks made during the %{academic_year} academic year
        </p>
