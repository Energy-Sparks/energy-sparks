        coverage: Energy Sparks may not have full coverage for all meters in schools, but school data is only made available for analysis where we have significant coverage. This means our figures may underestimate actual or potential savings.
        data_updated: The data on this page was last updated on %{date}.
        other_analysis: Other analysis, e.g. progress against energy targets is based on the latest available data at the point of analysis.
        other_metrics: Other metrics, including school enrolment, engagement metrics and ROI values are based on the latest available data and Energy Sparks prices at the point of analysis.
        potential_savings: Potential cost savings are based on current tariff data for individual schools and/or the group.
        pupil_numbers: Pupil numbers and other benchmarking metrics such as floor area are based on data taken from the Department of Education database, or as supplied to us by users.
        reporting_basis: Reporting of energy savings, benchmarking and potential opportunities are based on analysing half-hourly energy data for the 12 calendar months between %{start_date} to %{end_date}.
