        potential_savings: Potential cost savings are based on current tariff data for individual schools and/or the group.
        pupil_numbers: Pupil numbers and other benchmarking metrics such as floor area are based on data taken from the Department of Education database, or as supplied to us by users.
        reporting_basis: Reporting of energy savings, benchmarking and potential opportunities are based on analysing half-hourly energy data for the 12 calendar months between %{start_date} to %{end_date}.
