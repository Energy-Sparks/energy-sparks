      title: Data Adrodd SECR
      usage:
        how_to_identify_gaps_html: |-
          <h3>Sut i adnabod a llenwi bylchau mewn data</h3>
          <p>Ni all data a lawrlwythwyd o Sbarcynni gwmpasu holl ofynion adrodd SECR. Er enghraifft:</p>
          <ul>
          <li>Dim ond data nwy a thrydan sydd gan Sbarcynni, nid ydym yn gallu cyflwyno data defnydd ar gyfer
          </li>tanwyddau amgen fel olew neu fiomas.
          <li>Nid yw Sbarcynni yn cynnwys data ynni ar gyfer trafnidiaeth na gweithgareddau eraill.</li>
          </ul>
          <p>
          Mae'n debygol y bydd bylchau ychwanegol yn y data, felly dylech adolygu'r data sydd ar gael yn Sbarcynni a chael
          data drwy filiau ynni neu brosesau adrodd mewnol eraill i lenwi'r bylchau hyn. Er enghraifft:
          <ul>
          <li>Efallai na fydd Sbarcynni yn cwmpasu pob ysgol o fewn y MAT</li>
          <li>Efallai na fydd gan Sbarcynni fynediad at ddata ar gyfer pob mesurydd ym mhob ysgol</li>
          <li>Efallai y bydd bylchau yn y cyfnod adrodd - er enghraifft oherwydd mesuryddion diffygiol</li>
          <li>Am rai misoedd, gall ansawdd y data fod yn isel oherwydd problemau gyda'r mesurydd neu amcangyfrif o'r defnydd a dderbyniwyd gan eich cyflenwr ynni.</li>
          </ul>
          </p>
          <p>
          Mae'r tab Data yn cynnwys lawrlwythiadau CSV o'r holl ddata sydd ar gael ar gyfer eich ysgolion yn fisol. Bob mis, rhoddir
          cod ansawdd i'r data i ddangos a yw'n gyflawn ai peidio.
          </p>
          <p>
          Os byddwch yn diweddaru unrhyw ffigurau misol neu'n llenwi unrhyw fylchau, peidiwch ag anghofio diweddaru'r cyfansymiau defnydd ac
          ailgyfrifo data allyriadau.
          </p>
        how_to_improve_html: |-
          <h3>Sut i wella'r broses hon yn y dyfodol</h3>
          <p>
          Mae'r offeryn Sbarcynni hwn wedi'i gynllunio i gefnogi rhywun nad yw wedi casglu data ar gyfer adrodd SECR o'r blaen.
          Dylai'r wybodaeth yma wneud y broses yn haws, gan leihau'r angen i gasglu gwybodaeth o'ch biliau
          ynni. Fodd bynnag, byddwch yn gallu llunio eich adroddiad SECR yn gyflymach yn y dyfodol os cesglir ffigurau defnydd o ysgolion bob mis a'u cofnodi'n ganolog.
          </p>
        purpose_of_this_tool_html: |-
          <h3>Pwrpas yr offeryn hwn</h3>
          <p>
          Mae'n ofynnol i Ymddiriedolaethau Aml-Academi sy'n defnyddio mwy na swm penodol o ynni adrodd ar eu defnydd o ynni ac allyriadau nwyon tŷ gwydr cysylltiedig. Am ragor o fanylion, gweler <a href=\"https://www.gov.uk/government/publications/streamlined-energy-and-carbon-reporting-secr-for-academy-trusts/streamlined-energy-and-carbon-reporting-secr-for-academy-trusts\">Adroddiadau Ynni a Charbon Syml (SECR)
          ar gyfer ymddiriedolaethau academi - GOV.UK</a>.
          </p>
          <p>
          Mae Sbarcynni yn darparu storfa unigryw o ddata ynni ar gyfer MATs, ac yn cyflwyno cyfle i leihau'r ymdrech sydd ei hangen ar staff MAT wrth lunio eu hadroddiadau SECR. Fodd bynnag, ni fydd eich set ddata Sbarcynni bob amser yn cwmpasu'r holl ddata ynni sydd ei angen. Er enghraifft, efallai na fyddwn yn cynnwys eich holl ysgolion; efallai bod gan rai ysgolion fesuryddion nad ydynt yn gallu anfon data atom; neu efallai bod bylchau yn rhywfaint o'r data ynni a
          adroddwyd.
          </p>
          <p>Dylai'r wybodaeth isod eich cynorthwyo i nodi a llenwi unrhyw fylchau.</p>
        what_is_included_html: |-
          <h3>Beth sydd wedi'i gynnwys yn yr adroddiad?</h3>
          <p>
          Mae'r tab Data yn cynnwys data defnydd nwy a thrydan, ffactorau trosi a data allyriadau cysylltiedig mewn
          fformat sy'n gydnaws ag adrodd SECR. Fodd bynnag, bydd angen i chi wirio ei fod yn gyflawn ac ychwanegu unrhyw ddata
          gofynnol arall.
          </p>
