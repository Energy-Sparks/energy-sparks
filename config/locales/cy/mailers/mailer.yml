    build_an_energy_saving_team_html: <b>Adeiladu tîm arbed ynni:</b> ystyriwch <a href="%{root_url}activity_types/33">sefydlu tîm myfyrwyr</a> i arwain ar effeithlonrwydd ynni yn eich ysgol a'u helpu i <a href="%{root_url}activity_types/174">ddod o hyd i'w cynghreiriaid ynni</a>. Gallant ddechrau defnyddio ein gweithgareddau addysgol ar unwaith. Gwyliwch ein <a href="https://www.youtube.com/watch?v=7tTpe2ur67k&list=PLMAAPNnPXGlyu8fqhXjrZgLDduHDzBIca&index=9">fideo</a> ar sut i gofnodi gweithgareddau.
