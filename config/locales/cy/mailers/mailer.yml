    sign_up_to_energy_saving_alerts_html: <b>Cofrestrwch ar gyfer rhybuddion a negeseuon arbed ynni:</b> Mae ein system rhybuddio wedi helpu rhai ysgolion i arbed miloedd o bunnoedd drwy eu hysbysu am newidiadau disgwyliedig yn eu defnydd o ynni. Gallwch hefyd dderbyn awgrymiadau a diweddariadau rheolaidd i helpu eich ysgol i wneud y gorau o'i chyfrif Sbarcynni drwy gydol y flwyddyn. <a href="%{root_url}profiles">Newidiwch eich dewisiadau e-bost yma.</a>
    we_hope: Gobeithiwn y bydd Sbarcynni yn grymuso eich disgyblion, staff yr ysgol, a chymuned ehangach yr ysgol i gymryd camau i wneud eich ysgol yn fwy ynni-effeithlon.
    welcome_email:
      check_your_school_details_html: '<b>Gwiriwch fod manylion eich ysgol yn gywir</b> ar Sbarcynni: Gall sicrhau bod <a href="%{details_url}">manylion eich ysgol</a>, <a href="%{times_url}">oriau agor</a> a <a href="%{calendar_url}">chalendr eich ysgol</a> yn gywir wella''r gefnogaeth a gewch gennym ni.'
      subject: Croeso i Sbarcynni
      thank_you_for_confirming: Diolch am gadarnhau eich cyfrif defnyddiwr Sbarcynni.
      view_your_school: Gweld eich ysgol
      we_are_current_working: Rydym wrthi’n gweithio i gael data ynni ar gyfer eich ysgol a byddwn yn rhoi gwybod i chi pan fydd ar gael.
      we_have_now: Rydym bellach wedi sefydlu eich cyfrif Sbarcynni ac yn fuan byddwch yn gallu ei ddefnyddio i weld faint o ynni mae eich ysgol yn ei ddefnyddio a darganfod rhagor am y cyfleoedd arbed ynni gorau yn seiliedig ar eich defnydd ynni presennol.
      you_can_now_use: Gallwch bellach ddefnyddio Sbarcynni i weld faint o ynni y mae eich ysgol yn ei ddefnyddio, cael gwybod am y cyfleoedd arbed ynni mwyaf ac archwilio ein gweithgareddau a’n hadnoddau addysgol sydd wedi’u cynllunio i addysgu’ch disgyblion am ynni tra’n arbed arian i’w hysgol.
    welcome_existing:
      dashboard_message: 'Sylwer: %{message}'
      need_some_help_html: <b>Os ydych chi'n teimlo bod angen rhywfaint o help arnoch chi</b> i ddefnyddio Sbarcynni, mae gennym ni lawer o ganllawiau a gwybodaeth ddefnyddiol am hyfforddiant <a href="%{root_url}intervention_types/74">yma</a>.
      subject: Croeso i gyfrif Sbarcynni %{school}
      we_are_pleased_html: Rydym yn falch o'ch croesawu i gyfrif Sbarcynni %{school}. Er efallai eich bod eisoes yn gyfarwydd â Sbarcynni, mae'r e-bost hwn yn cynnwys gwybodaeth bwysig i'ch helpu i ymgyfarwyddo â data ar gyfer %{school} ac i roi rhai atgoffwyr i chi rhag ofn y bydd eu hangen arnoch. Gallwch ddefnyddio Sbarcynni i <a href="%{url}">weld faint o ynni mae eich ysgol yn ei ddefnyddio</a>.
      we_estimated_that_html: Rydym yn amcangyfrif mai eich cyfle arbed ynni blaenoriaeth uchaf yw %{opportunity}. Gallai gwneud hyn arbed cymaint â %{gbp_saving} a %{co2_saving}kg o CO₂ y flwyddyn i chi.
