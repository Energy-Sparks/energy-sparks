      title: "Mae %{school_name} (%{school_group}) wedi cwblhau'r broses gosod awtomatig"
    data_enabled_email:
      below_are_a_few_admin_html: |-
        <div>
        <b>Ychwanegu defnyddwyr ychwanegol</b>
        <p>I annog eich cydweithwyr i gymryd rhan yn Sbarcynni, gallwch chi sefydlu cyfrif defnyddiwr iddyn nhw ar Sbarcynni. Rydym yn annog pob ysgol i gael o leiaf 3 aelod o staff gyda chyfrifon defnyddwyr. I ychwanegu eich cydweithwyr, cliciwch <a href="%{users_url}">yma</a>. Rhowch eu manylion a byddant yn cael e-bost sefydlu cyfrif.</p>
        </div>
        <div>
        <b>Diweddarwch eich oriau agor i gynnwys gweithgareddau ar ôl ysgol ac unrhyw rhentu</b>
        <p>Ar hyn o bryd mae Sbarcynni yn seilio ei ddadansoddiad ar amseroedd agor ysgolion o %{opening_time} i %{closing_time}. Dylai'r rhain fod yr amseroedd pan fydd y disgyblion yn cyrraedd ac yn gadael yr ysgol. Dylai hyn fod pan fydd yr ysgol yn gwbl weithredol gyda mwyafrif y disgyblion yn yr ysgol. Gellir cynnwys clybiau cyn ac ar ôl ysgol os yw mwyafrif yr ysgol yn cael ei defnyddio gan ddisgyblion. Dylid rhestru rhentiadau allanol neu adegau pan fydd gennych gyfran fach yn unig o ystâd eich ysgol yn cael ei defnyddio gan ddisgyblion o dan amseroedd defnydd cymunedol.</p>
        <p>Bydd gan lawer o ysgolion staff glanhau neu staff eraill sy'n gweithio yn yr ysgol y tu allan i'r oriau pan fydd ar agor i ddisgyblion. Peidiwch â chynnwys y cyfnodau hyn ym mhrif oriau agor eich ysgol gan ein bod yn argymell y dylech gadw'r defnydd o ynni i'r lleiafswm yn ystod yr amseroedd hyn.</p>
        <p>I osod oriau agor eich ysgol, cliciwch <a href="%{times_url}">yma</a>.
        </div>
      below_are_a_few_common_html: |-
        <p>Isod mae ychydig o bethau eraill a allai eich helpu wrth ddefnyddio Sbarcynni:</p>
        <div>
        <b>Gosodwch eich targedau arbed ynni cyntaf</b>
        <p>Gallwch osod targedau ar gyfer lleihau eich defnydd o ynni. Byddwn yn rhoi adroddiadau i chi i'ch helpu i fonitro eich cynnydd, set o weithgareddau a argymhellir a fydd yn ymgysylltu â'r ysgol gyfan, a mewnwelediadau ychwanegol trwy ein dadansoddiad manwl o'ch defnydd o ynni.</p>
        <p>Ddim yn siŵr beth sy'n gyraeddadwy? Rydym wedi awgrymu targed cychwynnol yn seiliedig ar ein llwyddiannau wrth weithio gydag ysgolion ledled y wlad.</p>
        </div>
        <div>
        <b>Gwyliau ysgol</b>
        <p><b>Ar gyfartaledd, mae 15% o ynni ysgolion yn cael ei ddefnyddio yn ystod y gwyliau.</b> Mae creu rhestr wirio diffodd ynni ar gyfer y gwyliau a mynd drwy'r rhestr ar ddiwedd y tymor yn un o'r ffyrdd hawsaf a rhataf o leihau biliau ynni, hyd yn oed i ysgolion sydd â chlybiau gwyliau. Mae gennym rai <a href="%{root_url}intervention_types/71">rhestrau gwirio diffodd enghreifftiol</a> ar gael i chi eu defnyddio.</p>
        </div>
        <div>
        <b>Hyfforddiant staff</b>
        <p>Os hoffech dderbyn hyfforddiant pellach ar sut i ddefnyddio Sbarcynni yn effeithiol yn eich ysgol, gallwch gofrestru ar gyfer un o'n sesiynau sefydlu rhithwir drwy <a href="%{root_url}training">ein gwefan</a>. Gall staff hefyd wylio ein fideos cyflwyniadol wedi'u recordio ymlaen llaw sydd ar gael yn <a href="https://www.youtube.com/@energysparksuk">https://www.youtube.com/@energysparksuk</a>.</p>
        </div>
      below_are_a_few_final_html: |-
        <div>
        <b>Cofnodwch eich gweithgareddau</b>
        <p>Mae <a href="%{root_url}activity_categories">dros 140 o weithgareddau</a>  ar wefan Sbarcynni i chi eu gwneud gyda'ch myfyrwyr. Ar ôl i chi gwblhau gweithgaredd, peidiwch ag anghofio <a href="%{root_url}activity_categories">ei gofnodi</a> ar eich cyfrif Sbarcynni. Mae gennym ni hefyd <a href="%{root_url}intervention_type_groups">lawer o gamau arbed ynni dan arweiniad oedolion</a>. Gallwch chi <a href="%{root_url}intervention_type_groups">gofnodi gweithredoedd dan arweiniad oedolion</a> ar Sbarcynni a byddwch chi'n ennill pwyntiau amdanyn nhw hefyd. Wrth i chi ennill pwyntiau, byddwch chi'n symud i fyny <a href="%{root_url}scoreboards">sgôr-fwrdd</a> Sbarcynni. Bob blwyddyn mae gennym wobrau sgôr-fwrdd cyffrous i'r ysgolion sy'n sgorio orau.</p>
        </div>
        <div>
        <b>Diolch am ymuno!</b>
        <p>Pob lwc i chi ar eich taith arbed ynni. Os oes gennych unrhyw gwestiynau, byddaf yn hapus i helpu.</p>
        </div>
